version: '3.8'

services:
  backend:
    image: agunes77/ai-trading-backend:latest
    container_name: ai-trading-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
      - BINANCE_SANDBOX=${BINANCE_SANDBOX:-true}
      - MT5_LOGIN=${MT5_LOGIN:-}
      - MT5_PASSWORD=${MT5_PASSWORD:-}
      - MT5_SERVER=${MT5_SERVER:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./data_cache:/app/data_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trading-network

  frontend:
    image: agunes77/ai-trading-frontend:latest
    container_name: ai-trading-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge
